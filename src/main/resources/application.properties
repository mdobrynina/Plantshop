# ── Server ────────────────────────────────────────────────────────────────
server.port=8080

# ── DataSource (H2 — заглушка под PostgreSQL) ─────────────────────────────
# Когда PostgreSQL готов: закомментировать 3 строки H2 и раскомментировать PG
spring.datasource.url=jdbc:h2:mem:plantshop;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# PostgreSQL (раскомментировать, когда будет реальная БД):
# spring.datasource.url=jdbc:postgresql://localhost:5432/plantshop
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=plantshop_user
# spring.datasource.password=secret

# ── JPA ───────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Ждём инициализации схемы JPA перед вставкой data.sql
spring.jpa.defer-datasource-initialization=true

# ── SQL seed ──────────────────────────────────────────────────────────────
spring.sql.init.mode=always

# ── H2 Console (только для разработки) ────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────
# Секрет минимум 32 символа (256 бит). В продакшне заменить через env-переменную.
app.jwt.secret=plantshop-super-secret-key-change-me-in-prod-32chars
app.jwt.expiration-ms=86400000
