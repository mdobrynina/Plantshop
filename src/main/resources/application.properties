# ── Server ────────────────────────────────────────────────────────────────
server.port=8080

# ── DataSource (PostgreSQL) ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/plantshop
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1234567890

# ── JPA ───────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# ── SQL seed ──────────────────────────────────────────────────────────────
spring.sql.init.mode=never

# ── Mail (Yandex SMTP) ────────────────────────────────────────────────────
spring.mail.host=smtp.yandex.ru
spring.mail.port=587
spring.mail.username=moh.plantshop@yandex.com
spring.mail.password=pbfpqzxgdlkpwtpx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=moh.plantshop@yandex.com

# ── Upload ────────────────────────────────────────────────────────────────
app.upload.dir=frontend/public/images/products
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT ───────────────────────────────────────────────────────────────────
# Секрет минимум 32 символа (256 бит). В продакшне заменить через env-переменную.
app.jwt.secret=plantshop-super-secret-key-change-me-in-prod-32chars
app.jwt.expiration-ms=86400000
